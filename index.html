<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Maze DX - Helena Games Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle, #1e1b4b 0%, #0f172a 100%);
            color: white;
            user-select: none;
            touch-action: none;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-canvas {
            image-rendering: auto;
            max-width: 100%;
            height: auto;
            background: rgba(15, 23, 42, 0.95);
            border: 3px solid #6366f1;
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.4);
        }
        .btn-control {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 2px solid rgba(129, 140, 248, 0.3);
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        .btn-control:active { 
            background: #4f46e5; 
            transform: translateY(4px); 
            box-shadow: 0 0px 0 rgba(0,0,0,0.3);
        }
        .neon-text { text-shadow: 0 0 15px rgba(99, 102, 241, 0.8), 0 0 30px rgba(79, 70, 229, 0.5); }
        
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: opacity 0.6s ease;
        }

        .credit-text {
            font-size: 0.65rem;
            letter-spacing: 0.15rem;
            color: rgba(129, 140, 248, 0.6);
            margin-top: 1.5rem;
            text-transform: uppercase;
            font-weight: 300;
        }

        .skin-card {
            background: rgba(30, 41, 59, 0.9);
            border: 2px solid transparent;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .skin-card.selected { border-color: #818cf8; background: rgba(79, 70, 229, 0.4); }
        .skin-card.locked { opacity: 0.5; }
    </style>
</head>
<body class="p-4">

    <!-- Splash Screen de Abertura -->
    <div id="splash-screen">
        <div class="animate-pulse">
            <h1 class="text-6xl font-black italic tracking-tighter neon-text mb-2">HELENA GAMES</h1>
            <div class="w-full max-w-[200px] h-1 bg-indigo-900/50 rounded-full overflow-hidden mx-auto mt-4">
                <div id="progress-bar" class="w-0 h-full bg-indigo-500 transition-all duration-1000"></div>
            </div>
            <p class="credit-text">Jogo desenvolvido por Helena Mota Moreira</p>
        </div>
    </div>

    <!-- Interface -->
    <div class="w-full max-w-md flex justify-between items-center mb-4">
        <div class="flex flex-col">
            <span id="level-ui" class="text-xs font-bold text-indigo-400 tracking-wider">NÍVEL 1</span>
            <span id="coin-ui" class="text-2xl font-black text-yellow-400 drop-shadow-md">🐁 0</span>
        </div>
        <button id="btn-skins" class="bg-indigo-600 px-5 py-2 rounded-xl font-bold text-sm shadow-lg hover:bg-indigo-500 active:scale-95 transition-all uppercase tracking-widest border-b-4 border-indigo-800">
            Loja 🐾
        </button>
    </div>

    <!-- Canvas -->
    <div class="relative w-full max-w-md">
        <canvas id="game-canvas"></canvas>
        
        <!-- Vitória -->
        <div id="win-screen" class="absolute inset-0 hidden flex-col items-center justify-center rounded-2xl border-2 border-indigo-400 backdrop-blur-md z-50 bg-slate-900/80">
            <h3 class="text-5xl font-black text-white mb-2 neon-text italic">VITÓRIA!</h3>
            <p class="text-indigo-200 mb-8 font-medium">Peixinho capturado!</p>
            <button id="btn-next" class="bg-indigo-500 text-white font-black py-4 px-10 rounded-2xl shadow-2xl hover:bg-indigo-400 active:scale-90 transition-all text-xl uppercase italic border-b-4 border-indigo-700">
                PRÓXIMO NÍVEL
            </button>
        </div>
    </div>

    <!-- Controlos -->
    <div class="mt-8 grid grid-cols-3 gap-4">
        <div></div>
        <button class="btn-control" id="btn-up">⬆️</button>
        <div></div>
        <button class="btn-control" id="btn-left">⬅️</button>
        <button class="btn-control" id="btn-down">⬇️</button>
        <button class="btn-control" id="btn-right">➡️</button>
    </div>

    <!-- Modal Loja -->
    <div id="shop-modal" class="fixed inset-0 bg-black/95 hidden z-[500] items-center justify-center p-6 backdrop-blur-xl">
        <div class="bg-slate-900 border-2 border-indigo-500 rounded-3xl w-full max-w-sm p-6 flex flex-col max-h-[85vh] shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 class="text-2xl font-bold text-white">Loja de Animais</h3>
                    <p class="text-yellow-400 text-sm font-bold">Saldo: 🐁 <span id="shop-coins">0</span></p>
                </div>
                <button id="close-shop" class="text-4xl text-slate-500 hover:text-white">&times;</button>
            </div>
            <div id="skins-container" class="grid grid-cols-3 gap-4 overflow-y-auto pr-2 pb-4">
                <!-- Skins aqui -->
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let level = 1, score = 0, gridSize = 13, cellSize = 0;
        let maze = [], ghosts = [], items = [], fish = { x: 0, y: 0 };
        let isGameReady = false;

        const skins = [
            { id: 0, emoji: '🐱', name: 'Gato', price: 0, unlocked: true },
            { id: 1, emoji: '🐶', name: 'Cão', price: 15, unlocked: false },
            { id: 2, emoji: '🐰', name: 'Coelho', price: 30, unlocked: false },
            { id: 3, emoji: '🦊', name: 'Raposa', price: 60, unlocked: false },
            { id: 4, emoji: '🐯', name: 'Tigre', price: 150, unlocked: false },
            { id: 5, emoji: '🦄', name: 'Unicórnio', price: 500, unlocked: false }
        ];
        let currentSkinIndex = 0;

        let player = { x: 1, y: 1, shield: false, strength: false };

        window.onload = () => {
            document.getElementById('progress-bar').style.width = '100%';
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    initGame();
                }, 600);
            }, 1800);
        };

        function initGame() {
            isGameReady = false;
            // Aumenta o tamanho conforme o nível
            gridSize = 11 + (Math.floor((level - 1) / 2) * 2);
            if (gridSize > 23) gridSize = 23;
            
            generateMaze(gridSize);
            resize();
            
            document.getElementById('level-ui').innerText = `NÍVEL ${level}`;
            document.getElementById('win-screen').classList.add('hidden');
            updateUI();
            
            isGameReady = true;
        }

        function generateMaze(size) {
            maze = Array(size).fill().map(() => Array(size).fill(1));
            const stack = [{x: 1, y: 1}];
            maze[1][1] = 0;

            while (stack.length > 0) {
                const curr = stack[stack.length - 1];
                const neighbors = [];
                [[0,-2],[0,2],[-2,0],[2,0]].forEach(([dx,dy]) => {
                    const nx = curr.x+dx, ny = curr.y+dy;
                    if (nx>0 && nx<size-1 && ny>0 && ny<size-1 && maze[ny][nx]===1) 
                        neighbors.push({x:nx, y:ny, dx, dy});
                });
                if (neighbors.length > 0) {
                    const next = neighbors[Math.floor(Math.random()*neighbors.length)];
                    maze[next.y][next.x] = 0;
                    maze[curr.y+next.dy/2][curr.x+next.dx/2] = 0;
                    stack.push(next);
                } else stack.pop();
            }

            // Criar atalhos e caminhos extras
            for(let i=0; i < size; i++) {
                let rx = Math.floor(Math.random()*(size-2))+1;
                let ry = Math.floor(Math.random()*(size-2))+1;
                if (maze[ry]) maze[ry][rx] = 0;
            }

            items = []; ghosts = [];
            // Spawn de Itens e VILÕES
            for (let y = 1; y < size-1; y++) {
                for (let x = 1; x < size-1; x++) {
                    if (maze[y][x] === 0 && !(x===1 && y===1)) {
                        const r = Math.random();
                        // Itens
                        if (r < 0.12) items.push({x, y, type: 'rat'});
                        else if (r < 0.14) items.push({x, y, type: Math.random() > 0.5 ? 'shield' : 'fist'});
                        
                        // FANTASMAS (Vilões) - Probabilidade ajustada para garantir presença
                        const distToSpawn = Math.abs(x - 1) + Math.abs(y - 1);
                        if (r > 0.96 && distToSpawn > 5) {
                            ghosts.push({ x, y, startX: x, startY: y });
                        }
                    }
                }
            }

            // Garantir pelo menos 1 fantasma em níveis superiores a 1
            if (ghosts.length === 0 && level > 1) {
                ghosts.push({ x: size-3, y: size-3, startX: size-3, startY: size-3 });
            }

            fish = { x: size-2, y: size-2 };
            maze[fish.y][fish.x] = 0;
            player.x = 1; player.y = 1;
            player.shield = false; player.strength = false;
        }

        function resize() {
            const dim = Math.min(window.innerWidth - 40, 420);
            canvas.width = dim;
            canvas.height = dim;
            cellSize = dim / gridSize;
            render();
        }

        function render() {
            if (!isGameReady || !maze || maze.length === 0) return;

            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            // Paredes (Neon Indigo)
            ctx.shadowBlur = 0;
            for (let y=0; y<gridSize; y++) {
                if (!maze[y]) continue;
                for (let x=0; x<gridSize; x++) {
                    if (maze[y][x] === 1) {
                        ctx.fillStyle = '#312e81';
                        ctx.beginPath();
                        ctx.roundRect(x*cellSize+2, y*cellSize+2, cellSize-4, cellSize-4, 5);
                        ctx.fill();
                        
                        // Detalhe de luz no topo
                        ctx.fillStyle = '#4338ca';
                        ctx.fillRect(x*cellSize+4, y*cellSize+4, cellSize-8, 2);
                    }
                }
            }

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            
            // Itens
            items.forEach(it => {
                ctx.font = `${cellSize*0.6}px Arial`;
                const emoji = it.type === 'rat' ? '🐁' : (it.type === 'shield' ? '🛡️' : '👊');
                ctx.fillText(emoji, it.x*cellSize+cellSize/2, it.y*cellSize+cellSize/2);
            });

            // Peixe (Meta)
            ctx.font = `${cellSize*0.8}px Arial`;
            ctx.fillText('🐟', fish.x*cellSize+cellSize/2, fish.y*cellSize+cellSize/2);

            // FANTASMAS (Vilões)
            ghosts.forEach(g => {
                ctx.font = `${cellSize*0.75}px Arial`;
                ctx.shadowColor = 'white';
                ctx.shadowBlur = 5;
                ctx.fillText('👻', g.x*cellSize+cellSize/2, g.y*cellSize+cellSize/2);
                ctx.shadowBlur = 0;
            });

            // Player (Skin Selecionada)
            ctx.save();
            if (player.shield) {
                ctx.beginPath();
                ctx.arc(player.x*cellSize+cellSize/2, player.y*cellSize+cellSize/2, cellSize/1.4, 0, Math.PI*2);
                ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 3; ctx.stroke();
            }
            if (player.strength) {
                ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 10;
            }
            ctx.font = `${cellSize*0.8}px Arial`;
            ctx.fillText(skins[currentSkinIndex].emoji, player.x*cellSize+cellSize/2, player.y*cellSize+cellSize/2);
            ctx.restore();
        }

        function tryMove(dx, dy) {
            if (!isGameReady || document.getElementById('win-screen').classList.contains('flex')) return;
            let nx = player.x + dx, ny = player.y + dy;
            
            if (nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize) {
                // Habilidade de quebrar paredes (Punho)
                if (maze[ny] && maze[ny][nx] === 1 && player.strength) {
                    maze[ny][nx] = 0;
                }
                
                if (maze[ny] && maze[ny][nx] === 0) {
                    player.x = nx; player.y = ny;
                    checkCollisions();
                    render();
                }
            }
        }

        function checkCollisions() {
            // Coleta de itens
            items = items.filter(it => {
                if (it.x === player.x && it.y === player.y) {
                    if (it.type === 'rat') { score++; updateUI(); }
                    else activatePower(it.type);
                    return false;
                }
                return true;
            });

            // Colisão com FANTASMAS
            ghosts.forEach(g => {
                const dist = Math.sqrt(Math.pow(g.x - player.x, 2) + Math.pow(g.y - player.y, 2));
                if (dist < 0.6) {
                    if (player.shield) {
                        player.shield = false;
                        // Repulsa o fantasma para longe
                        g.x = g.startX; g.y = g.startY;
                    } else {
                        // Perdeu: volta ao início do nível
                        player.x = 1; player.y = 1;
                    }
                }
            });

            // Vitória
            if (player.x === fish.x && player.y === fish.y) {
                document.getElementById('win-screen').style.display = 'flex';
                document.getElementById('win-screen').classList.remove('hidden');
            }
        }

        function activatePower(type) {
            if (type==='shield') player.shield = true;
            if (type==='fist') player.strength = true;
            setTimeout(() => {
                if(type==='fist') player.strength = false;
                render();
            }, 7000);
        }

        function updateUI() {
            document.getElementById('coin-ui').innerText = `🐁 ${score}`;
            document.getElementById('shop-coins').innerText = score;
        }

        function openShop() {
            const container = document.getElementById('skins-container');
            container.innerHTML = '';
            skins.forEach((skin, idx) => {
                const card = document.createElement('div');
                card.className = `skin-card p-3 text-center cursor-pointer ${currentSkinIndex === idx ? 'selected' : ''} ${!skin.unlocked ? 'locked' : ''}`;
                card.innerHTML = `
                    <div class="text-3xl mb-1">${skin.emoji}</div>
                    <div class="text-[10px] font-bold uppercase truncate text-white">${skin.name}</div>
                    ${!skin.unlocked ? `<div class="text-[10px] text-yellow-400 mt-1 font-black">🐁 ${skin.price}</div>` : `<div class="text-[9px] text-indigo-400 mt-1 uppercase">Pronto</div>`}
                `;
                card.onclick = () => {
                    if (skin.unlocked) { 
                        currentSkinIndex = idx; 
                        openShop(); 
                        render(); 
                    } else if (score >= skin.price) {
                        score -= skin.price; 
                        skin.unlocked = true; 
                        currentSkinIndex = idx;
                        updateUI(); openShop(); render();
                    }
                };
                container.appendChild(card);
            });
            document.getElementById('shop-modal').classList.replace('hidden', 'flex');
        }

        // CICLO DOS VILÕES (Fantasmas perseguidores)
        setInterval(() => {
            if (!isGameReady || document.getElementById('win-screen').classList.contains('flex')) return;
            
            ghosts.forEach(g => {
                const dx = player.x - g.x;
                const dy = player.y - g.y;
                
                // Velocidade aumenta conforme o nível
                const ghostSpeed = 0.02 + (level * 0.005);
                const limitSpeed = 0.06;
                const speed = Math.min(ghostSpeed, limitSpeed);

                g.x += Math.sign(dx) * speed;
                g.y += Math.sign(dy) * speed;
            });
            
            checkCollisions();
            render();
        }, 100);

        // Controlos de toque e clique
        const bind = (id, dx, dy) => {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                tryMove(dx, dy);
            });
        };

        bind('btn-up', 0, -1); bind('btn-down', 0, 1);
        bind('btn-left', -1, 0); bind('btn-right', 1, 0);

        // Teclado
        window.onkeydown = (e) => {
            if(e.key === 'ArrowUp') tryMove(0, -1);
            if(e.key === 'ArrowDown') tryMove(0, 1);
            if(e.key === 'ArrowLeft') tryMove(-1, 0);
            if(e.key === 'ArrowRight') tryMove(1, 0);
        };

        document.getElementById('btn-skins').onclick = openShop;
        document.getElementById('close-shop').onclick = () => document.getElementById('shop-modal').classList.replace('flex', 'hidden');
        document.getElementById('btn-next').onclick = () => { 
            level++; 
            initGame(); 
            document.getElementById('win-screen').style.display = 'none';
        };
        window.onresize = resize;
    </script>
</body>
</html>

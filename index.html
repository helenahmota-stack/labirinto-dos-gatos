<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Maze Neon Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle, #1e1b4b 0%, #0f172a 100%);
            color: white;
            user-select: none;
            touch-action: none;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #game-canvas {
            image-rendering: auto;
            max-width: 100%;
            height: auto;
            background: rgba(15, 23, 42, 0.9);
            border: 4px solid #6366f1;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.5);
        }
        .btn-control {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 2px solid rgba(99, 102, 241, 0.4);
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.1s;
        }
        .btn-control:active {
            background: #6366f1;
            transform: scale(0.9);
            box-shadow: 0 0 15px #6366f1;
        }
        .neon-text {
            text-shadow: 0 0 12px rgba(99, 102, 241, 0.9);
        }
        #win-overlay {
            z-index: 100;
        }
    </style>
</head>
<body class="p-4">

    <!-- Header -->
    <div class="w-full max-w-md flex justify-between items-center mb-4">
        <div>
            <h1 class="text-3xl font-black neon-text italic tracking-tighter text-white">CAT MAZE <span class="text-indigo-400">DX</span></h1>
            <div class="flex gap-2 mt-1">
                <span class="bg-indigo-900 border border-indigo-500 px-2 py-0.5 rounded text-[10px] font-bold" id="level-display">NÍVEL 1</span>
                <span class="bg-yellow-900 border border-yellow-500 text-yellow-300 px-2 py-0.5 rounded text-[10px] font-bold" id="coin-display">🐁 0</span>
            </div>
        </div>
        <button id="open-skins" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-6 rounded-xl shadow-lg transition-all text-sm uppercase tracking-widest">
            Skins
        </button>
    </div>

    <!-- Game -->
    <div class="relative">
        <canvas id="game-canvas"></canvas>
        
        <div id="win-overlay" class="absolute inset-0 bg-indigo-950/95 backdrop-blur-md hidden flex-col items-center justify-center rounded-2xl border-4 border-indigo-400">
            <h2 class="text-5xl font-black text-white mb-2 neon-text text-center">VITÓRIA!</h2>
            <p class="text-indigo-200 mb-8 font-medium">Caçador de ratinhos mestre!</p>
            <div id="new-skin-preview" class="text-8xl mb-10"></div>
            <button id="next-level" class="bg-white text-indigo-900 font-black py-4 px-12 rounded-2xl text-xl hover:scale-105 active:scale-95 transition-all">
                PRÓXIMO NÍVEL
            </button>
        </div>
    </div>

    <!-- Controls -->
    <div class="mt-6 grid grid-cols-3 gap-3">
        <div></div>
        <button class="btn-control" id="ctrl-up">⬆️</button>
        <div></div>
        <button class="btn-control" id="ctrl-left">⬅️</button>
        <button class="btn-control" id="ctrl-down">⬇️</button>
        <button class="btn-control" id="ctrl-right">➡️</button>
    </div>

    <!-- Modal -->
    <div id="skins-modal" class="fixed inset-0 bg-black/80 hidden z-[200] items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-slate-900 border-2 border-indigo-500 rounded-3xl w-full max-w-sm p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 class="text-2xl font-bold text-white">Gatos</h3>
                    <p class="text-sm text-yellow-400 font-bold" id="modal-coins">🐁 0</p>
                </div>
                <button id="close-skins" class="text-3xl text-slate-400 hover:text-white">&times;</button>
            </div>
            <div id="skins-grid" class="grid grid-cols-3 gap-3 max-h-[350px] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <script>
        // Sistema de Áudio
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            move: () => playSound(180, 'sine', 0.1, 0.05),
            coin: () => {
                playSound(900, 'square', 0.1, 0.04);
                setTimeout(() => playSound(1300, 'square', 0.1, 0.04), 40);
            },
            win: () => {
                [523, 659, 783, 1046].forEach((n, i) => setTimeout(() => playSound(n, 'triangle', 0.5, 0.08), i * 120));
            }
        };

        // Estado do Jogo
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let level = 1, totalCoins = 0, gridSize = 11, cellSize = 0;
        let maze = [], coins = [], player = { x: 1, y: 1 }, goal = { x: 0, y: 0 };
        let currentSkinIndex = 0;

        const catSkins = [
            { emoji: '🐱', name: 'Original', unlocked: true, price: 0 },
            { emoji: '🐈', name: 'Laranja', unlocked: false, price: 10 },
            { emoji: '🐈‍⬛', name: 'Ninja', unlocked: false, price: 30 },
            { emoji: '🦁', name: 'Simba', unlocked: false, price: 60 },
            { emoji: '🐯', name: 'Tigre', unlocked: false, price: 100 },
            { emoji: '😸', name: 'Dourado', unlocked: false, price: 200 },
            { emoji: '😻', name: 'Amor', unlocked: false, price: 350 },
            { emoji: '👻', name: 'Fantasma', unlocked: false, price: 500 },
            { emoji: '👽', name: 'Alien', unlocked: false, price: 750 },
            { emoji: '👑', name: 'Rei', unlocked: false, price: 1000 }
        ];

        function generateMaze(size) {
            let m = Array(size).fill().map(() => Array(size).fill(1));
            let path = [];
            function walk(x, y) {
                m[y][x] = 0;
                path.push({x, y});
                let dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]].sort(() => Math.random() - 0.5);
                for (let [dx, dy] of dirs) {
                    let nx = x + dx, ny = y + dy;
                    if (nx > 0 && nx < size - 1 && ny > 0 && ny < size - 1 && m[ny][nx] === 1) {
                        m[y + dy/2][x + dx/2] = 0;
                        path.push({x: x + dx/2, y: y + dy/2});
                        walk(nx, ny);
                    }
                }
            }
            walk(1, 1);
            let g = { x: size - 2, y: size - 2 };
            m[g.y][g.x] = 0;
            let rats = path.filter(n => (n.x !== 1 || n.y !== 1) && (n.x !== g.x || n.y !== g.y) && Math.random() < 0.25);
            return { m, g, rats };
        }

        function initLevel() {
            gridSize = 9 + (Math.floor(level / 2) * 2);
            if (gridSize > 21) gridSize = 21;
            const data = generateMaze(gridSize);
            maze = data.m; goal = data.g; coins = data.rats; player = { x: 1, y: 1 };
            resize();
            draw();
            document.getElementById('win-overlay').classList.add('hidden');
            document.getElementById('level-display').innerText = `NÍVEL ${level}`;
            updateUI();
        }

        function resize() {
            const size = Math.min(window.innerWidth - 40, 420);
            canvas.width = size; canvas.height = size;
            cellSize = size / gridSize;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            
            // Labirinto
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    if (maze[y][x] === 1) {
                        ctx.fillStyle = "#312e81";
                        ctx.beginPath();
                        ctx.roundRect(x * cellSize + 2, y * cellSize + 2, cellSize - 4, cellSize - 4, 4);
                        ctx.fill();
                        ctx.strokeStyle = "#6366f1";
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }

            // Moedas/Ratos
            ctx.font = `${cellSize * 0.5}px Arial`;
            coins.forEach(c => {
                ctx.shadowBlur = 8; ctx.shadowColor = "yellow";
                ctx.fillText("🐁", c.x * cellSize + cellSize/2, c.y * cellSize + cellSize/2);
            });

            // Meta
            ctx.shadowBlur = 10; ctx.shadowColor = "cyan";
            ctx.font = `${cellSize * 0.7}px Arial`;
            ctx.fillText("🐟", goal.x * cellSize + cellSize/2, goal.y * cellSize + cellSize/2);

            // Gato
            ctx.shadowBlur = 15; ctx.shadowColor = "white";
            ctx.font = `${cellSize * 0.8}px Arial`;
            ctx.fillText(catSkins[currentSkinIndex].emoji, player.x * cellSize + cellSize/2, player.y * cellSize + cellSize/2);
            ctx.shadowBlur = 0;
        }

        function move(dx, dy) {
            if (!document.getElementById('win-overlay').classList.contains('hidden')) return;
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            let nx = player.x + dx, ny = player.y + dy;
            if (nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize && maze[ny][nx] === 0) {
                player.x = nx; player.y = ny;
                sounds.move();
                
                const cIdx = coins.findIndex(c => c.x === nx && c.y === ny);
                if (cIdx !== -1) {
                    coins.splice(cIdx, 1);
                    totalCoins++;
                    sounds.coin();
                    updateUI();
                }
                
                draw();
                if (player.x === goal.x && player.y === goal.y) {
                    totalCoins += (level * 5);
                    sounds.win();
                    updateUI();
                    document.getElementById('new-skin-preview').innerText = catSkins[currentSkinIndex].emoji;
                    document.getElementById('win-overlay').classList.remove('hidden');
                }
            }
        }

        function updateUI() {
            document.getElementById('coin-display').innerText = `🐁 ${totalCoins}`;
            document.getElementById('modal-coins').innerText = `🐁 ${totalCoins}`;
        }

        function renderSkins() {
            const grid = document.getElementById('skins-grid');
            grid.innerHTML = '';
            catSkins.forEach((s, i) => {
                const d = document.createElement('div');
                const sel = currentSkinIndex === i;
                d.className = `p-3 rounded-2xl border-2 cursor-pointer text-center ${sel ? 'border-indigo-400 bg-indigo-900/40' : 'border-slate-800 bg-slate-800'}`;
                if (s.unlocked) {
                    d.innerHTML = `<div class="text-3xl">${s.emoji}</div><div class="text-[8px] uppercase mt-1">${s.name}</div>`;
                    d.onclick = () => { currentSkinIndex = i; sounds.move(); renderSkins(); draw(); };
                } else {
                    d.innerHTML = `<div class="text-3xl grayscale opacity-30">${s.emoji}</div><div class="bg-yellow-500 text-black text-[9px] font-bold rounded px-1 mt-1">🐁 ${s.price}</div>`;
                    d.onclick = () => {
                        if (totalCoins >= s.price) {
                            totalCoins -= s.price; s.unlocked = true; currentSkinIndex = i;
                            updateUI(); renderSkins(); draw();
                        }
                    };
                }
                grid.appendChild(d);
            });
        }

        // Botoes
        document.getElementById('ctrl-up').onclick = () => move(0, -1);
        document.getElementById('ctrl-down').onclick = () => move(0, 1);
        document.getElementById('ctrl-left').onclick = () => move(-1, 0);
        document.getElementById('ctrl-right').onclick = () => move(1, 0);
        
        window.onkeydown = (e) => {
            if (e.key === 'ArrowUp') move(0, -1);
            if (e.key === 'ArrowDown') move(0, 1);
            if (e.key === 'ArrowLeft') move(-1, 0);
            if (e.key === 'ArrowRight') move(1, 0);
        };

        document.getElementById('next-level').onclick = () => { level++; initLevel(); };
        document.getElementById('open-skins').onclick = () => { renderSkins(); document.getElementById('skins-modal').classList.replace('hidden', 'flex'); };
        document.getElementById('close-skins').onclick = () => document.getElementById('skins-modal').classList.replace('flex', 'hidden');

        window.onresize = resize;
        initLevel();
    </script>
</body>
</html>
